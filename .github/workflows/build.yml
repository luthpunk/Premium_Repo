name: Build Extensions

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build Cloudstream Plugins
        run: ./gradlew make

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: build/
